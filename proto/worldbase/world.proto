syntax = "proto3";

package proto.worldbase;

option java_multiple_files = true;
option java_outer_classname = "WorldProtoOuter";

import "proto/worldbase/world_configuration.proto";
import "proto/world/tile.proto";

message WorldProto {
  proto.worldbase.WorldConfigurationProto meta = 1;
  repeated proto.world.TileProto tiles = 2;
}