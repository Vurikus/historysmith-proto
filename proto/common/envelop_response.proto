syntax = "proto3";

package proto.common;

option java_multiple_files = true;
option java_outer_classname = "EnvelopeResponseProtoOuter";

message EnvelopeResponseProto {
  int32 message_id = 1;
  oneof payload {
    proto.common.ErrorResponseProto error = 2;
    proto.common.SyncStateResponseProto sync_state = 3;
    proto.common.ActionResponseProto action = 4;
  }
}