syntax = "proto3";

package proto.common;

option java_multiple_files = true;
option java_outer_classname = "ObjectTypeProtoOuter";

// Тип сообщения в конверте
enum ObjectTypeProto {
  CheckActionReq = 0;              // Запрос на сервер с вопросом "можно ли" выполнить действие
  CheckActionResp = 1;             // Ответ сервера "можно ли" выполнить действие
  ActionReq = 2;                   // Запрос на сервер с намерением выполнить действие
  ActionResp = 3;                  // Ответ сервера на намерение выполнить действие
  SyncStateReq = 4;                // Запрос на синхронизацию объекта
  SyncStateResp = 5;               // Ответ сервера на синхронизацию объекта
}