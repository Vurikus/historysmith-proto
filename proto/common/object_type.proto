syntax = "proto3";

package proto.common;

option java_multiple_files = true;
option java_outer_classname = "ObjectTypeProtoOuter";

// Тип сообщения в конверте
enum ObjectTypeProto {
  TryAction = 0;              // Запрос на сервер с вопросом "можно ли" выполнить действие
  Action = 1;                 // Запрос на сервер с намерением выполнить действие
  SyncState = 2;              // Ответ с сервера с новым состоянием объекта
  RequestSyncState = 3;       // Запрос на синхронизацию объекта. Только со стороны клиента
}