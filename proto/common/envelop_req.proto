syntax = "proto3";

package proto.common;

option java_multiple_files = true;
option java_outer_classname = "EnvelopeRequestProtoOuter";

import "proto/common/sync_state_req.proto";
import "proto/common/action_req.proto";
import "proto/common/world_base_req.proto";
import "proto/common/intention_req.proto";

message EnvelopeRequestProto {
  int32 message_id = 1;
  oneof payload {
    proto.common.SyncStateRequestProto sync_state = 2;        // Запрос с клиента на получение актуального состояния объекта
    proto.common.ActionRequestProto action = 3;               // Объект с конкретным действием игрока. Например переместить отряд. Построить здание...
    proto.common.IntentionRequestProto intention = 4;         // Запросы на попытку совершить действие, намерение. Например игрок навел кнопку с попыткой атаковать
    proto.common.WorldBaseRequestProto world = 5;             // Запросы связанные с базой - неизменяемыми частями мира. Внутри объекта различные типы - либо создание нового мира, либо получение старого
  }
}