syntax = "proto3";

package proto.common;

option java_multiple_files = true;
option java_outer_classname = "SyncStateRequestProtoOuter";

import "proto/common/sync_state_object_type.proto";

// Мессадж для синхронизации состояния игровой партии на клиенте. Мессадж идет только со стороны сервера
// В ObjectTypeProto тип объекта который хотим синхронизировать
message SyncStateRequestProto {
  proto.common.SyncStateObjectTypeProto type = 1;
}